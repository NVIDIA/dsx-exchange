# Local development values - common across all clusters
#
# Uses locally-built auth-callout image instead of pulling from a registry.
# This file contains dev environment settings only.

# Auth-callout service configuration
global:
  eventBus:
    extraAccounts:
      LaunchLayer:
        enabled: true
        jetstream: true

auth-callout:
  fullnameOverride: "auth-callout"
  image:
    repository: auth-callout
    tag: "latest"
    pullPolicy: Never

  serviceConfig:
    # Keycloak JWKS endpoint for OAuth2 token validation
    jwks:
      url: "http://172.18.200.1/realms/event-bus/protocol/openid-connect/certs"
      issuer: "http://172.18.200.1/realms/event-bus"
      audience: "dsx-exchange"
    observability:
      tracing:
        enabled: false
