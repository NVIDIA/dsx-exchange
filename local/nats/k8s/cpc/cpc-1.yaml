# CPC-1 specific overrides

global:
  eventBus:
    clusterId: "1"
    gateway:
      routes:
        mqtt:
          gatewayNamespace: cpc-1-gateway
        natsClient:
          gatewayNamespace: cpc-1-gateway
        natsLeafnode:
          gatewayNamespace: cpc-1-gateway
        mqttMtls:
          gatewayNamespace: cpc-1-gateway
    # CPC-1 specific mTLS permissions
    auth:
      permissions:
        mtls:
          mqtt-client:
            identity: "CN=mqtt-client.cpc-1"
            account: "CPC"
