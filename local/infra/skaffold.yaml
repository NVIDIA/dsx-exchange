apiVersion: skaffold/v4beta14
kind: Config
metadata:
  name: infra
requires:
  - configs:
      - infra-controllers
      - infra-config
      - cert-manager
      - keycloak
profiles:
  - name: cpc-1
    patches:
      - op: remove
        path: /requires/0/configs/3
  - name: cpc-2
    patches:
      - op: remove
        path: /requires/0/configs/3
---
apiVersion: skaffold/v4beta14
kind: Config
metadata:
  name: envoy-gateway-crds
manifests:
  helm:
    releases:
      - name: eg-crds
        remoteChart: oci://docker.io/envoyproxy/gateway-crds-helm
        version: v1.5.4
        namespace: envoy-gateway-system
        setValues:
          crds.gatewayAPI.enabled: true
          crds.gatewayAPI.channel: experimental
          crds.envoyGateway.enabled: true
deploy:
  kubeContext: kind-csc
  statusCheck: true
  statusCheckDeadlineSeconds: 300
  kubectl:
    flags:
      apply:
        - --server-side
profiles:
  - name: cpc-1
    patches:
      - op: replace
        path: /deploy/kubeContext
        value: kind-cpc-1
  - name: cpc-2
    patches:
      - op: replace
        path: /deploy/kubeContext
        value: kind-cpc-2
---
apiVersion: skaffold/v4beta14
kind: Config
metadata:
  name: cert-manager
manifests:
  kustomize:
    paths:
      - cert-manager
deploy:
  kubeContext: kind-csc
  statusCheck: true
  statusCheckDeadlineSeconds: 300
  kubectl: {}
profiles:
  - name: cpc-1
    patches:
      - op: replace
        path: /deploy/kubeContext
        value: kind-cpc-1
  - name: cpc-2
    patches:
      - op: replace
        path: /deploy/kubeContext
        value: kind-cpc-2
---
apiVersion: skaffold/v4beta14
kind: Config
metadata:
  name: infra-controllers
requires:
  - configs:
      - envoy-gateway-crds
deploy:
  kubeContext: kind-csc
  statusCheck: true
  statusCheckDeadlineSeconds: 600
  helm:
    concurrency: 0
    releases:
      - name: metallb
        remoteChart: metallb
        repo: https://metallb.github.io/metallb
        version: 0.15.2
        namespace: metallb-system
        createNamespace: true
      - name: eg
        remoteChart: oci://docker.io/envoyproxy/gateway-helm
        version: v1.5.4
        namespace: envoy-gateway-system
        createNamespace: true
        valuesFiles:
          - envoy-gateway/values.yaml
      - name: metrics-server
        remoteChart: metrics-server
        repo: https://kubernetes-sigs.github.io/metrics-server/
        version: 3.13.0
        namespace: kube-system
        setValues:
          image.tag: v0.8.1
          args[0]: --kubelet-insecure-tls
      - name: prometheus
        remoteChart: kube-prometheus-stack
        repo: https://prometheus-community.github.io/helm-charts
        version: 86.1.0
        namespace: monitoring
        createNamespace: true
        valuesFiles:
          - prometheus/values.yaml
profiles:
  - name: cpc-1
    patches:
      - op: replace
        path: /deploy/kubeContext
        value: kind-cpc-1
  - name: cpc-2
    patches:
      - op: replace
        path: /deploy/kubeContext
        value: kind-cpc-2
---
apiVersion: skaffold/v4beta14
kind: Config
metadata:
  name: infra-config
requires:
  - configs:
      - infra-controllers
manifests:
  rawYaml:
    - metallb/csc-pool.yaml
    - envoy-gateway/gatewayclass.yaml
    - envoy-gateway/gateway.yaml
deploy:
  kubeContext: kind-csc
  statusCheck: true
  statusCheckDeadlineSeconds: 180
  kubectl: {}
profiles:
  - name: cpc-1
    patches:
      - op: replace
        path: /manifests/rawYaml/0
        value: metallb/cpc-1-pool.yaml
      - op: replace
        path: /deploy/kubeContext
        value: kind-cpc-1
  - name: cpc-2
    patches:
      - op: replace
        path: /manifests/rawYaml/0
        value: metallb/cpc-2-pool.yaml
      - op: replace
        path: /deploy/kubeContext
        value: kind-cpc-2
---
apiVersion: skaffold/v4beta14
kind: Config
metadata:
  name: keycloak-operator
manifests:
  kustomize:
    paths:
      - keycloak/operator
deploy:
  kubeContext: kind-csc
  statusCheck: true
  statusCheckDeadlineSeconds: 300
  kubectl: {}
---
apiVersion: skaffold/v4beta14
kind: Config
metadata:
  name: keycloak
requires:
  - configs:
      - keycloak-operator
      - infra-config
manifests:
  rawYaml:
    - keycloak/realm-import.yaml
    - keycloak/keycloak.yaml
    - keycloak/httproute.yaml
deploy:
  kubeContext: kind-csc
  statusCheck: true
  statusCheckDeadlineSeconds: 600
  kubectl: {}
