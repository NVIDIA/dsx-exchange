apiVersion: skaffold/v4beta14
kind: Config
metadata:
  name: infra-csc-config
requires:
  - configs:
      - infra-csc-controllers
manifests:
  rawYaml:
    - metallb/csc-pool.yaml
    - envoy-gateway/gatewayclass.yaml
    - envoy-gateway/gateway.yaml
