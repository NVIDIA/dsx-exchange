apiVersion: skaffold/v4beta14
kind: Config
metadata:
  name: infra-csc-controllers
requires:
  - configs:
      - envoy-gateway-crds-csc
deploy:
  kubeContext: kind-csc
  statusCheck: true
  statusCheckDeadlineSeconds: 600
  helm:
    concurrency: 4
    releases:
      - name: metallb
        remoteChart: metallb
        repo: https://metallb.github.io/metallb
        version: 0.15.2
        namespace: metallb-system
        createNamespace: true
        upgradeOnChange: true
      - name: eg
        remoteChart: oci://docker.io/envoyproxy/gateway-helm
        version: v1.5.4
        namespace: envoy-gateway-system
        createNamespace: true
        upgradeOnChange: true
      - name: metrics-server
        remoteChart: metrics-server
        repo: https://kubernetes-sigs.github.io/metrics-server/
        version: 3.13.0
        namespace: kube-system
        setValues:
          image.tag: v0.8.1
          args[0]: --kubelet-insecure-tls
        upgradeOnChange: true
      - name: prometheus
        remoteChart: kube-prometheus-stack
        repo: https://prometheus-community.github.io/helm-charts
        version: 86.1.0
        namespace: monitoring
        createNamespace: true
        valuesFiles:
          - prometheus/values.yaml
        upgradeOnChange: true
---
