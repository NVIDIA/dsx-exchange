config:
  envoyGateway:
    gateway:
      controllerName: gateway.envoyproxy.io/gatewayclass-controller
    provider:
      type: Kubernetes
    logging:
      level:
        default: info

deployment:
  envoyGateway:
    # Envoy Gateway controller. The shared Gateway's Envoy proxy resources are
    # set in gateway.yaml through EnvoyProxy.
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
