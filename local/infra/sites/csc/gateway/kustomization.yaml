apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: csc-gateway
resources:
  - namespace.yaml
  - ../../gateway-base
patches:
  - target:
      kind: EnvoyProxy
      name: shared-gateway
    patch: |-
      - op: replace
        path: /spec/provider/kubernetes/envoyService/annotations/metallb.universe.tf~1address-pool
        value: csc-envoy-pool
