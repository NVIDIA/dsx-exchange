apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
  namespace: keycloak
spec:
  instances: 1
  http:
    httpEnabled: true
  hostname:
    strict: false
    strictBackchannel: false
  ingress:
    enabled: false
  resources:
    requests:
      cpu: "100m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "1536Mi"
  unsupported:
    podTemplate:
      spec:
        volumes:
          - name: realm-import
            configMap:
              name: keycloak-realm-import
        containers:
          - args:
              - "-Djgroups.dns.query=keycloak-discovery.keycloak"
              - "--verbose"
              - "start"
              - "--import-realm"
            env:
              # Constrain the JVM heap so heap + non-heap RSS fits inside the
              # container memory limit. Without this, Quarkus defaults to
              # MaxRAMPercentage=70%, and heap + metaspace/GC/buffers exceed the
              # limit and the pod is OOMKilled during the build phase.
              - name: JAVA_OPTS_KC_HEAP
                value: "-Xms256m -Xmx768m"
            volumeMounts:
              - name: realm-import
                mountPath: /opt/keycloak/data/import
