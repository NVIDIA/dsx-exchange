apiVersion: skaffold/v4beta14
kind: Config
metadata:
  name: metrics-server-single-cluster
.metricsServerHelm: &metrics_server_helm
  releases:
    - name: metrics-server
      chartPath: ../../../.cache/helm/metrics-server-3.13.0.tgz
      namespace: kube-system
      skipBuildDependencies: true
      setValues:
        image.tag: v0.8.1
        args[0]: --kubelet-insecure-tls
deploy:
  kubeContext: kind-dsx-exchange
  statusCheck: true
  statusCheckDeadlineSeconds: 600
  helm: *metrics_server_helm
---
apiVersion: skaffold/v4beta14
kind: Config
metadata:
  name: metrics-server-csc
deploy:
  kubeContext: kind-csc
  statusCheck: true
  statusCheckDeadlineSeconds: 600
  helm: *metrics_server_helm
---
apiVersion: skaffold/v4beta14
kind: Config
metadata:
  name: metrics-server-cpc-1
deploy:
  kubeContext: kind-cpc-1
  statusCheck: true
  statusCheckDeadlineSeconds: 600
  helm: *metrics_server_helm
---
apiVersion: skaffold/v4beta14
kind: Config
metadata:
  name: metrics-server-cpc-2
deploy:
  kubeContext: kind-cpc-2
  statusCheck: true
  statusCheckDeadlineSeconds: 600
  helm: *metrics_server_helm
