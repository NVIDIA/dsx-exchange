apiVersion: skaffold/v4beta14
kind: Config
metadata:
  name: prometheus-csc
.prometheusHelm: &prometheus_helm
  releases:
    - name: prometheus
      remoteChart: kube-prometheus-stack
      repo: https://prometheus-community.github.io/helm-charts
      version: 86.1.0
      namespace: monitoring
      createNamespace: true
      valuesFiles:
        - values.yaml
deploy:
  kubeContext: kind-csc
  statusCheck: true
  statusCheckDeadlineSeconds: 600
  helm: *prometheus_helm
---
apiVersion: skaffold/v4beta14
kind: Config
metadata:
  name: prometheus-cpc-1
deploy:
  kubeContext: kind-cpc-1
  statusCheck: true
  statusCheckDeadlineSeconds: 600
  helm: *prometheus_helm
---
apiVersion: skaffold/v4beta14
kind: Config
metadata:
  name: prometheus-cpc-2
deploy:
  kubeContext: kind-cpc-2
  statusCheck: true
  statusCheckDeadlineSeconds: 600
  helm: *prometheus_helm
