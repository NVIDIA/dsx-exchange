apiVersion: skaffold/v4beta14
kind: Config
metadata:
  name: dsx-exchange-mcp
build:
  tagPolicy:
    inputDigest: {}
  local:
    push: true
    useDockerCLI: true
    useBuildkit: true
  artifacts:
    - image: localhost:5001/dsx-exchange-mcp
      context: ../..
      docker:
        dockerfile: mcp/dsx-exchange-mcp/Dockerfile
        cliFlags:
          - --provenance=false
profiles:
  - name: ci-dockerhub-mirror
    activation:
      - env: SKAFFOLD_DOCKERHUB_MIRROR_REGISTRY=.+
    patches:
      - op: add
        path: /build/artifacts/0/docker/buildArgs
        value:
          BUILDER_IMG: "{{.SKAFFOLD_DOCKERHUB_MIRROR_REGISTRY}}/library/golang"
deploy:
  kubeContext: kind-csc
  statusCheck: true
  statusCheckDeadlineSeconds: 300
  tolerateFailuresUntilDeadline: true
  helm:
    releases:
      - name: dsx-exchange-mcp
        chartPath: deploy/helm/dsx-exchange-mcp
        namespace: mcp-backends
        createNamespace: true
        wait: true
        valuesFiles:
          - deploy/helm/dsx-exchange-mcp/values.kind.yaml
        setValues:
          image.repository: localhost:5001/dsx-exchange-mcp
          image.tag: local
          image.pullPolicy: Always
