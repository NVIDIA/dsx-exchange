# Test-only overlay for backend-capacity runs through Latinum MCP Gateway.
# Keep rate limiting enabled, but raise the tenant quota so the DSX Exchange
# MCP backend, not the production-like 1000 RPS gateway limiter, becomes the measured
# bottleneck.
rateLimit:
  enabled: true
  tenantRequestsPerSecond: 5000
