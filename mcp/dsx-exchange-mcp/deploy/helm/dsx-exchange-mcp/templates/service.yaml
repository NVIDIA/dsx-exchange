apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    app: dsx-exchange-mcp
spec:
  type: ClusterIP
  selector:
    app: dsx-exchange-mcp
  ports:
    - name: mcp
      port: {{ .Values.service.port }}
      targetPort: mcp
      appProtocol: agentgateway.dev/mcp
