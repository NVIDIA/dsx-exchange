# Example overlay for gated e2e / dev testing against a deployed DSX Exchange
# bus. Replace the placeholder broker host with the target environment. Do not
# commit real bearer tokens or CA material; create the referenced Secret out of
# band in the target namespace.

natsURL: tls://<broker-host>:1883

runtimeClassName: ""

mqtt:
  authMode: jwt_passthrough
  username: oauthtoken
  tls:
    caCertSecret:
      name: dsx-exchange-broker-ca
      key: ca.crt
    serverName: <broker-host>
    insecureSkipVerify: false
