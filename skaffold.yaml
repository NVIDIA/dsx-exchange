apiVersion: skaffold/v4beta14
kind: Config
metadata:
  name: auth-callout-image
build:
  tagPolicy:
    envTemplate:
      template: local
  local:
    push: true
    useDockerCLI: true
    useBuildkit: true
  artifacts:
    - image: localhost:5001/auth-callout
      context: auth-callout
      docker:
        dockerfile: build/package/Dockerfile
        cacheFrom:
          - localhost:5001/auth-callout:local
---
apiVersion: skaffold/v4beta14
kind: Config
metadata:
  name: metallb-csc
deploy:
  kubeContext: kind-csc
  statusCheck: true
  statusCheckDeadlineSeconds: 300
  helm:
    releases:
      - name: metallb
        remoteChart: metallb
        repo: https://metallb.github.io/metallb
        version: 0.15.2
        namespace: metallb-system
        createNamespace: true
        wait: true
        upgradeOnChange: true
---
apiVersion: skaffold/v4beta14
kind: Config
metadata:
  name: metallb-csc-config
requires:
  - configs:
      - metallb-csc
manifests:
  rawYaml:
    - local/infra/metallb/csc-pool.yaml
deploy:
  kubeContext: kind-csc
  statusCheck: true
  statusCheckDeadlineSeconds: 120
  kubectl:
    hooks:
      before:
        - host:
            command: ["local/infra/scripts/wait-metallb.sh", "kind-csc"]
---
