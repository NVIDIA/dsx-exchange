apiVersion: skaffold/v4beta14
kind: Config
metadata:
  name: envoy-gateway-csc-crds
requires:
  - configs:
      - metallb-csc-config
manifests:
  helm:
    releases:
      - name: eg-crds
        chartPath: local/infra/charts/envoy-gateway/gateway-crds-helm
        namespace: envoy-gateway-system
        setValues:
          crds.gatewayAPI.enabled: true
          crds.gatewayAPI.channel: experimental
          crds.envoyGateway.enabled: true
deploy:
  kubeContext: kind-csc
  statusCheck: true
  statusCheckDeadlineSeconds: 300
  kubectl:
    flags:
      apply:
        - --server-side
---
apiVersion: skaffold/v4beta14
kind: Config
metadata:
  name: envoy-gateway-csc
requires:
  - configs:
      - envoy-gateway-csc-crds
deploy:
  kubeContext: kind-csc
  statusCheck: true
  statusCheckDeadlineSeconds: 300
  helm:
    hooks:
      after:
        - host:
            command: ["local/infra/scripts/wait-envoy-gateway.sh", "kind-csc"]
    releases:
      - name: eg
        chartPath: local/infra/charts/envoy-gateway/gateway-helm
        namespace: envoy-gateway-system
        createNamespace: true
        valuesFiles:
          - local/infra/envoy-gateway/values.yaml
        wait: true
        upgradeOnChange: true
---
