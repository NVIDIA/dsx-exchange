apiVersion: skaffold/v4beta14
kind: Config
metadata:
  name: nats-csc
deploy:
  kubeContext: kind-csc
  statusCheck: true
  statusCheckDeadlineSeconds: 600
  helm:
    flags:
      install:
        - --timeout=10m
      upgrade:
        - --timeout=10m
    hooks:
      before:
        - host:
            command: ["local/nats/prepare-secrets.sh", "csc"]
      after:
        - host:
            command: ["local/nats/wait-ready.sh", "csc"]
    releases:
      - name: nats-event-bus
        chartPath: deploy/nats-event-bus
        skipBuildDependencies: true
        namespace: event-bus
        createNamespace: true
        valuesFiles:
          - local/nats/k8s/local-dev-values.yaml
          - local/nats/k8s/csc/values.yaml
        setValues:
          auth-callout.image.repository: localhost:5001/auth-callout
          auth-callout.image.tag: local
          auth-callout.image.pullPolicy: Always
        wait: true
        upgradeOnChange: true
---
