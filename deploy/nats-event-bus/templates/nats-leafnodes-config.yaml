{{/*
Outbound leaf node connections for CPC clusters to connect to CSC.
CSC clusters accept incoming connections and don't need outbound config.
*/}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-leafnodes-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: nats-config
    app.kubernetes.io/part-of: nats-event-bus
data:
  leafnodes.conf: |
{{- $serverTls := .Values.eventBus.cscLeafServerTLS | default dict }}
{{- $remoteTls := .Values.eventBus.cpcLeafClientTLS | default dict }}
{{- if and (eq .Values.eventBus.clusterType "csc") (not (empty $serverTls)) }}
{{ include "nats-event-bus.natsConfBlock" (dict "name" "tls" "fields" $serverTls) | nindent 4 }}
{{- end }}
{{- if and (eq .Values.eventBus.clusterType "cpc") .Values.eventBus.cscEndpoint }}
    remotes: [
      {
        urls: [{{ .Values.eventBus.cscEndpoint | quote }}]
        nkey: $LEAF_USER_SEED
        account: CSC
        {{- if not (empty $remoteTls) }}
{{ include "nats-event-bus.natsConfBlock" (dict "name" "tls" "fields" $remoteTls) | nindent 8 }}{{- end }}
      }
{{- range $name, $config := $.Values.eventBus.extraAccounts }}
{{- $enabled := true -}}
{{- if hasKey $config "enabled" -}}
{{- $enabled = $config.enabled -}}
{{- end -}}
{{- $leaf := get $config "leaf" | default dict -}}
{{- if and $enabled ($leaf.enabled | default false) }}
{{- $accountEnvName := include "nats-event-bus.extraAccountEnvName" $name -}}
{{- $seedEnv := get $leaf "seedEnv" | default (printf "LEAF_%s_USER_SEED" $accountEnvName) -}}
{{ printf "\n" }}
      {
        urls: [{{ $.Values.eventBus.cscEndpoint | quote }}]
        nkey: ${{ $seedEnv }}
        account: {{ $name | quote }}
        {{- if not (empty $remoteTls) }}
{{ include "nats-event-bus.natsConfBlock" (dict "name" "tls" "fields" $remoteTls) | nindent 8 }}{{- end }}
      }
{{- end }}
{{- end }}
    ]
{{- end }}
