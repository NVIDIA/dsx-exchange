# Security note: No untrusted input is used in run commands. All ${{ ... }}
# expressions reference repository metadata, env vars, or secrets only.

name: CI

on:
  push:
    branches:
      - main
      - "pull-request/[0-9]+"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25.5"
  GO_FLAGS: "-mod=vendor"
  KIND_VERSION: "v0.31.0"
  KUBECTL_VERSION: "v1.31.9"
  HELM_VERSION: "v4.2.0"

jobs:
  commitlint:
    name: Commit Lint
    runs-on: linux-amd64-cpu4
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: NVIDIA/dsx-github-actions/.github/actions/commitlint@07b465c2147fcbda4836cb869263577ea4719273 # v1.16.1

  license-headers:
    name: License Headers
    runs-on: linux-amd64-cpu4
    steps:
      - uses: actions/checkout@v4
      - uses: NVIDIA/dsx-github-actions/.github/actions/license-headers@07b465c2147fcbda4836cb869263577ea4719273 # v1.16.1
        with:
          license: apache
          copyright-holder: "NVIDIA CORPORATION & AFFILIATES. All rights reserved."
          year: "2026"
          paths: "auth-callout/src/ deploy/ local/ schemas/"
          ignore: "**/vendor/**,**/tests/**,auth-callout/tests/**"
          go-version: "1.25.5"

  go-lint:
    name: Go Lint (auth-callout)
    runs-on: linux-amd64-cpu4
    steps:
      - uses: actions/checkout@v4
      - uses: NVIDIA/dsx-github-actions/.github/actions/go-lint@07b465c2147fcbda4836cb869263577ea4719273 # v1.16.1
        with:
          go-version: "1.25.5"
          go-flags: "-mod=vendor"
          working-directory: auth-callout

  unit-test:
    name: Unit Test (auth-callout)
    runs-on: linux-amd64-cpu4
    steps:
      - uses: actions/checkout@v4
      - uses: NVIDIA/dsx-github-actions/.github/actions/go-test@07b465c2147fcbda4836cb869263577ea4719273 # v1.16.1
        with:
          go-version: "1.25.5"
          go-flags: "-mod=vendor"
          test-flags: "-v -count=1 -timeout=10m"
          working-directory: auth-callout

  unit-test-local-mqtt:
    name: Unit Test (local/mqtt-client)
    runs-on: linux-amd64-cpu4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"
          cache-dependency-path: local/mqtt-client/go.sum
      - name: Run tests
        working-directory: local/mqtt-client
        run: go test ./pkg/...

  unit-test-local-mqttbs:
    name: Unit Test (local/mqttbs)
    runs-on: linux-amd64-cpu4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"
          cache-dependency-path: local/mqttbs/go.sum
      - name: Run tests
        working-directory: local/mqttbs
        run: go test ./...

  third-party-licenses:
    name: Third-Party Licenses
    runs-on: linux-amd64-cpu4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"
          cache: true
          cache-dependency-path: auth-callout/go.sum
      - name: Regenerate THIRD_PARTY_LICENSES.csv via Makefile
        # Uses auth-callout/scripts/regenerate-third-party-licenses.sh which
        # filters local packages and applies multi-license overrides.
        # LC_ALL=C ensures `sort -u` produces stable output across runner locales.
        env:
          LC_ALL: C
        run: make -C auth-callout third-party-licenses
      - name: Verify THIRD_PARTY_LICENSES.csv is up-to-date
        run: git diff --exit-code THIRD_PARTY_LICENSES.csv

  docker-build:
    name: Docker Build (auth-callout)
    runs-on: linux-amd64-cpu4
    steps:
      - uses: actions/checkout@v4
      - uses: NVIDIA/dsx-github-actions/.github/actions/docker-build@07b465c2147fcbda4836cb869263577ea4719273 # v1.16.1
        with:
          image: dsx-exchange-auth-callout
          tags: ci-validation
          context: auth-callout
          dockerfile: auth-callout/build/package/Dockerfile
          platforms: linux/amd64
          push: "false"

  codeql-scan:
    name: CodeQL SAST
    runs-on: linux-amd64-cpu4
    permissions:
      contents: read
      security-events: write
      actions: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"
          cache: false
      - uses: NVIDIA/dsx-github-actions/.github/actions/codeql-scan@07b465c2147fcbda4836cb869263577ea4719273 # v1.16.1
        with:
          languages: go
          upload-sarif: "false"
          post-pr-comment: "true"

  trufflehog-scan:
    name: Secret Scan
    runs-on: linux-amd64-cpu4
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: NVIDIA/dsx-github-actions/.github/actions/trufflehog-scan@07b465c2147fcbda4836cb869263577ea4719273 # v1.16.1
        with:
          post-pr-comment: "true"
          fail-on-findings: "true"
          extra-args: "--exclude-paths=.trufflehog-exclude-paths"

  security-container-scan:
    name: Container Scan (auth-callout)
    needs: docker-build
    runs-on: linux-amd64-cpu4
    steps:
      - uses: actions/checkout@v4
      - uses: NVIDIA/dsx-github-actions/.github/actions/docker-build@07b465c2147fcbda4836cb869263577ea4719273 # v1.16.1
        with:
          image: dsx-exchange-auth-callout
          tags: scan-validation
          context: auth-callout
          dockerfile: auth-callout/build/package/Dockerfile
          platforms: linux/amd64
          push: "false"
      - uses: NVIDIA/dsx-github-actions/.github/actions/security-container-scan@07b465c2147fcbda4836cb869263577ea4719273 # v1.16.1
        with:
          image: dsx-exchange-auth-callout:scan-validation

  helm-validate-auth-callout:
    name: Helm Validate (auth-callout)
    runs-on: linux-amd64-cpu4
    steps:
      - uses: actions/checkout@v4
      - uses: NVIDIA/dsx-github-actions/.github/actions/helm-validate@07b465c2147fcbda4836cb869263577ea4719273 # v1.16.1
        with:
          chart-path: auth-callout/deploy

  helm-validate-nats-event-bus:
    name: Helm Validate (nats-event-bus)
    runs-on: linux-amd64-cpu4
    steps:
      - uses: actions/checkout@v4
      - uses: NVIDIA/dsx-github-actions/.github/actions/helm-validate@07b465c2147fcbda4836cb869263577ea4719273 # v1.16.1
        with:
          chart-path: deploy/nats-event-bus
          lint: "true"
          # Skip template rendering — requires NGC auth for dependency resolution.
          # Full dependency build happens on GitLab publish pipeline.
          template: "false"

  e2e-kind:
    name: E2E (Kind)
    needs:
      - license-headers
      - go-lint
      - unit-test
      - unit-test-local-mqtt
      - unit-test-local-mqttbs
      - third-party-licenses
      - docker-build
      - helm-validate-auth-callout
      - helm-validate-nats-event-bus
    runs-on: linux-amd64-cpu4
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"
          cache-dependency-path: |
            auth-callout/go.sum
            auth-callout/tests/go.sum
            local/mqtt-client/go.sum
            local/mqttbs/go.sum

      - name: Install e2e tools
        env:
          CFSSL_VERSION: "v1.6.5"
          NSC_VERSION: "v2.14.0"
          NKEYS_VERSION: "v0.4.15"
          YQ_VERSION: "v4.53.2"
        run: |
          set -euo pipefail

          mkdir -p "${RUNNER_TEMP}/bin"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

          curl -fsSL -o "${RUNNER_TEMP}/bin/kind" \
            "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          chmod +x "${RUNNER_TEMP}/bin/kind"

          curl -fsSL -o "${RUNNER_TEMP}/bin/kubectl" \
            "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x "${RUNNER_TEMP}/bin/kubectl"

          curl -fsSL -o "${RUNNER_TEMP}/helm.tar.gz" \
            "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz"
          tar -xzf "${RUNNER_TEMP}/helm.tar.gz" -C "${RUNNER_TEMP}"
          install -m 0755 "${RUNNER_TEMP}/linux-amd64/helm" "${RUNNER_TEMP}/bin/helm"

          GOBIN="${RUNNER_TEMP}/bin" go install "github.com/cloudflare/cfssl/cmd/cfssl@${CFSSL_VERSION}"
          GOBIN="${RUNNER_TEMP}/bin" go install "github.com/cloudflare/cfssl/cmd/cfssljson@${CFSSL_VERSION}"
          GOBIN="${RUNNER_TEMP}/bin" go install "github.com/nats-io/nsc/v2@${NSC_VERSION}"
          GOBIN="${RUNNER_TEMP}/bin" go install "github.com/nats-io/nkeys/nk@${NKEYS_VERSION}"
          GOBIN="${RUNNER_TEMP}/bin" go install "github.com/mikefarah/yq/v4@${YQ_VERSION}"

          kind version
          kubectl version --client=true
          helm version
          cfssl version
          nsc --version
          nk -v
          yq --version

      - name: Run Kind e2e
        run: |
          set -euo pipefail
          make -C local setup-infra
          make -C local deploy-nats
          make -C local validate-nats
          make test-e2e

      - name: Collect e2e diagnostics
        if: failure()
        run: |
          set +e
          command -v kubectl >/dev/null 2>&1 || exit 0

          for context in kind-csc kind-cpc-1 kind-cpc-2; do
            echo "== ${context}: nodes =="
            kubectl get nodes --context "${context}" -o wide

            echo "== ${context}: pods =="
            kubectl get pods -A --context "${context}" -o wide

            echo "== ${context}: gateways =="
            kubectl get gateways -A --context "${context}" -o wide

            echo "== ${context}: recent events =="
            kubectl get events -A --context "${context}" --sort-by=.lastTimestamp | tail -200
          done

      - name: Cleanup Kind clusters
        if: always()
        run: make clean-e2e

  slack-notify:
    name: Slack Notification
    if: github.ref == 'refs/heads/main' && always()
    needs:
      - commitlint
      - license-headers
      - go-lint
      - unit-test
      - unit-test-local-mqtt
      - unit-test-local-mqttbs
      - third-party-licenses
      - docker-build
      - codeql-scan
      - trufflehog-scan
      - security-container-scan
      - helm-validate-auth-callout
      - helm-validate-nats-event-bus
      - e2e-kind
    runs-on: linux-amd64-cpu4
    environment: notifications
    env:
      CI_STATUS: ${{ contains(needs.*.result, 'failure') && 'FAILED' || 'PASSED' }}
      RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - uses: NVIDIA/dsx-github-actions/.github/actions/slack-notify@07b465c2147fcbda4836cb869263577ea4719273 # v1.16.1
        with:
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          channel-id: C09VC8R4E92
          message: |
            *dsx-exchange CI* on `main` — *${{ env.CI_STATUS }}*
            <${{ env.RUN_URL }}|View run>
