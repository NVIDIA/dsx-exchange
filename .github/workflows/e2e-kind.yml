name: E2E Kind

on:
  workflow_call:

permissions:
  contents: read

env:
  GO_VERSION: "1.25.5"
  KIND_VERSION: "v0.31.0"
  KUBECTL_VERSION: "v1.31.9"
  HELM_VERSION: "v4.2.0"
  DOCKERHUB_MIRROR: "https://dc.local.gha-runners.nvidia.com"

jobs:
  e2e-kind:
    name: Run
    runs-on: linux-amd64-cpu32
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            auth-callout/go.sum
            auth-callout/tests/go.sum
            local/mqtt-client/go.sum
            local/mqttbs/go.sum

      - name: Install e2e tools
        run: |
          set -euo pipefail

          mkdir -p "${RUNNER_TEMP}/bin"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"
          export PATH="${RUNNER_TEMP}/bin:${PATH}"
          E2E_TOOLS_BIN="${RUNNER_TEMP}/bin" make install-e2e-tools

      - name: Configure Docker Hub mirror
        run: bash .github/workflows/e2e-kind/configure-dockerhub-mirror.sh

      - name: Show e2e runner resources
        run: bash .github/workflows/e2e-kind/show-runner-resources.sh

      - name: Prepare e2e runner
        run: bash .github/workflows/e2e-kind/prepare-runner.sh

      - name: Run Kind e2e
        run: |
          set -euo pipefail
          make -C local setup-infra
          make -C local deploy-nats
          make test-e2e

      - name: Collect e2e diagnostics
        if: failure()
        run: |
          set +e
          command -v kubectl >/dev/null 2>&1 || exit 0

          for context in kind-csc kind-cpc-1 kind-cpc-2; do
            echo "== ${context}: nodes =="
            kubectl get nodes --context "${context}" -o wide

            echo "== ${context}: pods =="
            kubectl get pods -A --context "${context}" -o wide

            echo "== ${context}: gateways =="
            kubectl get gateways -A --context "${context}" -o wide

            echo "== ${context}: recent events =="
            kubectl get events -A --context "${context}" --sort-by=.lastTimestamp | tail -200
          done

          bash .github/workflows/e2e-kind/show-runner-resources.sh

      - name: Cleanup Kind clusters
        if: always()
        run: make clean-e2e
